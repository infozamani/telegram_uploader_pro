{% extends 'base.html' %}
{% block title %}پیش‌نمایش محصول{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-lg-7">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark text-center">
                <h4>پیش‌نمایش محصول در کانال</h4>
            </div>
            <div class="card-body text-center p-4">

                <img src="{{ media_url }}" class="img-fluid rounded mb-4" style="max-height:500px;">

                <div class="text-end p-4 bg-light rounded" dir="rtl" style="font-size:1.15rem; line-height:2.2;">
                    {{ caption|safe }}
                </div>

                <div class="mt-4">
                    <form method="post" action="{% url 'confirm_product' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-warning btn-lg text-white px-5">
                            تأیید و ارسال به کانال
                        </button>
                        <a href="{% url 'upload_product' %}" class="btn btn-secondary btn-lg px-5">
                            ویرایش مجدد
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
